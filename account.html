<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حسابي - هود كوم</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* أنماط خاصة بصفحة الحساب */
    .account-page {
      padding: 100px 20px 60px;
      max-width: 600px;
      margin: 0 auto;
    }

    .account-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 30px;
      box-shadow: 0 10px 40px var(--shadow-color);
      text-align: center;
    }

    .account-avatar {
      width: 100px;
      height: 100px;
      background: var(--gradient-gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 40px;
      font-weight: 900;
      color: var(--black-pure);
      box-shadow: 0 4px 20px var(--gold-glow-strong);
    }

    .account-name {
      font-size: 24px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .account-email {
      font-size: 14px;
      color: var(--text-secondary);
      direction: ltr;
      text-align: center;
      margin-bottom: 8px;
    }

    .account-phone {
      font-size: 14px;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 20px;
    }

    .account-verified {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: rgba(0, 230, 118, 0.15);
      color: var(--success);
      border: 1px solid rgba(0, 230, 118, 0.3);
      border-radius: var(--radius-full);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .account-verified.unverified {
      background: rgba(255, 61, 87, 0.15);
      color: var(--danger);
      border-color: rgba(255, 61, 87, 0.3);
    }

    .account-divider {
      height: 1px;
      background: var(--border-color);
      margin: 20px 0;
    }

    .account-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      text-align: right;
      margin-bottom: 24px;
    }

    .account-info-item {
      background: var(--bg-secondary);
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
    }

    .account-info-item .label {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 2px;
    }

    .account-info-item .value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .account-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
    }

    .account-actions .btn {
      width: 100%;
    }

    .account-actions .btn-danger {
      background: var(--danger);
      color: white;
      border: none;
      padding: 12px;
      border-radius: var(--radius);
      font-family: 'Tajawal', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }

    .account-actions .btn-danger:hover {
      background: #e63946;
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(255, 61, 87, 0.4);
    }

    .account-guest {
      text-align: center;
      padding: 60px 20px;
    }

    .account-guest h2 {
      font-size: 22px;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .account-guest p {
      color: var(--text-secondary);
      margin-bottom: 20px;
    }

    @media (max-width: 480px) {
      .account-info-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- ===== النافبار ===== -->

    <a href="index.html" class="logo-link">
      <img src="logo.svg" alt="هود كوم" class="logo-img" width="140" height="42">
    </a>

  <!-- ===== محتوى الصفحة ===== -->

  </main>

  <!-- ===== التنبيه ===== -->

  </div>
